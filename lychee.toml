  "https://schemas.isotc211.org/",
  "http://schemas.isotc211.org/",
  "https://www.isotc211.org/",
  "https://www.ogc.org/standards/gml",
  "https://www.ogc.org/standards/citygml",
  "http://standards.iso.org/iso/",
  "https://jekyllrb.com/",
  "https://docs.asciidoctor.org/",
  "https://rubygems.org/",
  "https://docs.lutaml.org/",
