# Lychee link checker configuration

# Ignore these directories
exclude = [
  ".git",
  "node_modules",
  "vendor",
  "frontend/node_modules"
]

# User agents to use
user-agent = "lychee-link-checker/1.0"

# Timeout in seconds
timeout = "10"

# Maximum number of concurrent requests
max-concurrency = "8"

# Retry failed requests
retry = "true"
retry-attempts = "3"

# Cache results
cache = "true"
cache-ttl = "86400"
